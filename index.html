<html>
  <head>
    <title>Typewriter effect</title>
  </head>
  <style>
    body{
      background: navajowhite;
      background-size: cover;
      font-family: 'Trebuchet MS', sans-serif; 
    }
    .container{
      display: inline-block;
    }
    .typed-out{
      overflow: hidden;
      border-right: .15em solid orange;
      white-space: nowrap;
      font-size: 1.6rem;
      width: 0;
      animation: 
        typing 1s steps(20, end) forwards,
        blink .8s infinite;
    }
    @keyframes typing {
      from { width: 0 }
      to { width: 100% }
    }
    @keyframes blink {
      from { border-color: transparent }
      to { border-color: orange; }
    }
  </style>
<body>
<h1>Hi!<br></br><div class="typed-out">I'm Ananya, I'm a</div></div><br></br>
<div class="c1"><div class="typed-out">Web Developer</div></div>
</br>
<div class="c2"><div class="type2">Web Designer</div></div>
</br>
<div class="c3"><div class="type3">UI/UX Designer</div></div>
<br></br></h1>
</body>
</html>
